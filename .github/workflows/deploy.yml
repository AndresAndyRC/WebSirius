# ─────────────────────────────────────────────────────────────
#  SIRIUS — Deploy to Vercel
#  Best practices 2026:
#    · Vercel CLI oficial (sin actions de terceros)
#    · Preview en PRs, Producción en push a main
#    · npm cache integrado en setup-node
#    · Concurrency: cancela runs obsoletos del mismo branch
#    · Permisos de mínimo privilegio
#    · Deploy URL visible en el resumen del job
# ─────────────────────────────────────────────────────────────

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancela runs anteriores para el mismo branch/PR
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

# Mínimo privilegio
permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy (${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # 1 · Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 · Setup Node 20 + caché npm automático
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3 · Instalar dependencias (respeta package-lock.json)
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4 · Instalar Vercel CLI (oficial, sin third-party action)
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 5 · Pull configuración y env vars desde Vercel
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=$VERCEL_TOKEN

      # 6 · Build a través de Vercel CLI
      - name: Build project
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=$VERCEL_TOKEN
        env:
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          PUBLIC_SITE_URL:      ${{ secrets.PUBLIC_SITE_URL }}

      # 7 · Deploy del output pre-compilado
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=$VERCEL_TOKEN)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      # 8 · Mostrar URL en el resumen del job
      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Env:** ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}" >> $GITHUB_STEP_SUMMARY

